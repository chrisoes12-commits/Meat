<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moco Meats — Brand Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #0F0E0B;
  --bg-card:     #1A1814;
  --bg-raised:   #222018;
  --gold:        #C4973A;
  --gold-dim:    rgba(196,151,58,0.32);
  --gold-pale:   rgba(196,151,58,0.08);
  --text-1:      #F0EAE0;
  --text-2:      #A09078;
  --text-3:      #564A3C;
  --border:      rgba(196,151,58,0.10);
  --border-hi:   rgba(196,151,58,0.28);
  --ease:        cubic-bezier(0.4,0,0.2,1);
  --dur:         0.32s;
}
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text-1); font-family:'DM Sans',sans-serif; overflow:hidden; -webkit-font-smoothing:antialiased; }

/* ── SCREENS ── */
#app { position:fixed; inset:0; overflow:hidden; }
.screen {
  position:absolute; inset:0; background:var(--bg);
  overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
  transform:translateX(100%); transition:transform var(--dur) var(--ease); will-change:transform;
}
.screen.active { transform:translateX(0); }
.screen.behind { transform:translateX(-22%); }

/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:20;
  height:48px; display:flex; align-items:center; gap:10px; padding:0 14px;
  background:rgba(15,14,11,0.9); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
}
.back-btn {
  display:flex; align-items:center; gap:4px;
  background:none; border:none; color:var(--gold);
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
  cursor:pointer; padding:8px 2px; flex-shrink:0; white-space:nowrap;
}
.back-btn svg { width:14px; height:14px; }

/* ── BREADCRUMB ── */
.bc-nav {
  flex:1; display:flex; align-items:center; gap:5px;
  overflow-x:auto; scrollbar-width:none; -ms-overflow-style:none;
}
.bc-nav::-webkit-scrollbar { display:none; }
.bc-link {
  font-size:12px; font-weight:500; color:var(--text-3);
  white-space:nowrap; cursor:pointer; padding:4px 0;
  transition:color 0.15s ease;
}
.bc-link:active, .bc-link:hover { color:var(--text-2); }
.bc-sep { font-size:11px; color:var(--text-3); opacity:0.4; }
.bc-cur { font-size:12px; font-weight:500; color:var(--gold); white-space:nowrap; }

/* ── SECTION HERO ── */
.section-hero {
  padding:34px 20px 26px; text-align:center;
  border-bottom:1px solid var(--border); position:relative; overflow:hidden;
}
.section-hero::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 90% at 50% 0%, rgba(196,151,58,0.06) 0%, transparent 68%);
  pointer-events:none;
}
.sh-icon { width:54px; height:54px; margin:0 auto 14px; color:var(--text-2); }
.sh-icon svg { width:100%; height:100%; }
.sh-eyebrow {
  font-size:10px; font-weight:600; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--gold); margin-bottom:8px;
}
.sh-title {
  font-family:'Playfair Display',serif;
  font-size:clamp(30px,8vw,44px); font-weight:700;
  color:var(--text-1); letter-spacing:-0.02em; line-height:1.1; margin-bottom:10px;
}
.sh-rule { width:28px; height:1px; background:var(--gold); opacity:0.4; margin:0 auto 10px; }
.sh-sub { font-size:12px; color:var(--text-2); }

/* ── HOME ── */
.home-wrap { display:flex; flex-direction:column; min-height:100%; }
.hero {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:32px 24px 24px; text-align:center; position:relative;
}
@media(min-height:700px){.hero{padding:50px 24px 34px;}}
.hero::before {
  content:''; position:absolute; inset:0;
  background:radial-gradient(ellipse 80% 60% at 50% 0%, rgba(196,151,58,0.07) 0%, transparent 70%);
  pointer-events:none;
}
.eyebrow { font-size:10px; font-weight:600; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
.hero-name { font-family:'Playfair Display',serif; font-size:clamp(34px,9vw,58px); font-weight:700; letter-spacing:-0.02em; line-height:1.05; color:var(--text-1); margin-bottom:6px; }
.hero-sub { font-family:'Playfair Display',serif; font-size:clamp(12px,3vw,17px); font-style:italic; font-weight:400; color:var(--text-2); margin-bottom:20px; }
.hero-rule { width:32px; height:1px; background:var(--gold); opacity:0.4; margin:0 auto 16px; }
.hero-prompt { font-size:11px; font-weight:500; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-3); }

/* ── SPECIES GRID ── */
.species-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  padding:4px 14px 40px; max-width:700px; margin:0 auto; width:100%;
}
@media(min-width:640px){.species-grid{grid-template-columns:repeat(4,1fr);padding:4px 24px 56px;max-width:960px;}}
.species-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:16px;
  padding:26px 14px 22px; display:flex; flex-direction:column;
  align-items:center; gap:10px; cursor:pointer; text-align:center;
  transition:border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
  -webkit-user-select:none; user-select:none;
}
.species-card:active { border-color:var(--border-hi); background:var(--bg-raised); transform:scale(0.97); }
@media(hover:hover){.species-card:hover{border-color:var(--border-hi);background:var(--bg-raised);transform:translateY(-3px);}}
.s-icon { width:46px; height:46px; color:var(--text-2); }
.s-icon svg { width:100%; height:100%; }
.s-name { font-family:'Playfair Display',serif; font-size:17px; font-weight:600; color:var(--text-1); }
.s-count { font-size:11px; color:var(--text-3); font-weight:500; }
.s-arrow { font-size:14px; color:var(--gold); opacity:0.6; margin-top:2px; }
.home-footer { margin-top:auto; padding:16px; text-align:center; border-top:1px solid var(--border); }
.home-footer p { font-size:10px; color:var(--text-3); letter-spacing:0.08em; }

/* ── SCREEN CONTENT ── */
.s-content { padding:20px 14px 52px; max-width:960px; margin:0 auto; width:100%; }
@media(min-width:640px){.s-content{padding:24px 24px 64px;}}
.s-meta { font-size:10px; font-weight:600; letter-spacing:0.17em; text-transform:uppercase; color:var(--text-3); margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border); }

/* ── CATEGORY CARDS ── */
.cat-list { display:flex; flex-direction:column; gap:9px; }
.cat-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-left:3px solid var(--cat-accent,var(--gold));
  border-radius:12px; padding:18px 16px; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  transition:all 0.15s ease; -webkit-user-select:none; user-select:none;
}
.cat-card:active { background:var(--bg-raised); transform:translateX(3px); }
@media(hover:hover){.cat-card:hover{background:var(--bg-raised);transform:translateX(4px);border-color:var(--border-hi);}}
.cat-left { display:flex; flex-direction:column; gap:3px; }
.cat-name { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; color:var(--text-1); }
.cat-desc { font-size:12px; color:var(--text-2); }
.moco-tag {
  display:inline-block; font-size:9px; font-weight:700; letter-spacing:0.12em;
  text-transform:uppercase; color:#8899CC;
  background:rgba(26,58,139,0.14); border:1px solid rgba(100,130,200,0.18);
  border-radius:20px; padding:2px 8px; margin-top:4px; width:fit-content;
}
.cat-right { display:flex; align-items:center; gap:10px; flex-shrink:0; }
.cat-pill { font-size:11px; font-weight:600; color:var(--gold); background:var(--gold-pale); border:1px solid var(--gold-dim); border-radius:20px; padding:3px 10px; white-space:nowrap; }
.cat-arrow { color:var(--text-3); font-size:16px; }

/* ── BRAND GRID ── */
.tier-block { margin-bottom:26px; }
.tier-row { display:flex; align-items:center; gap:10px; margin-bottom:11px; }
.tier-tag { font-size:9px; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; white-space:nowrap; }
.tier-tag.sp { color:var(--gold); }
.tier-tag.pr { color:#B09070; }
.tier-tag.mr { color:var(--text-2); }
.tier-tag.en { color:var(--text-3); }
.tier-tag.fe { color:#8899CC; }
.tier-line { flex:1; height:1px; background:var(--border); }
.brands-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
@media(min-width:560px){.brands-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:860px){.brands-grid{grid-template-columns:repeat(4,1fr);}}

/* ── BRAND CARDS ── */
.brand-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
  padding:14px 13px; cursor:pointer; display:flex; flex-direction:column;
  gap:8px; min-height:130px;
  transition:all 0.15s ease; -webkit-user-select:none; user-select:none;
}
.brand-card.sp { background:linear-gradient(145deg,#17100A 0%,var(--bg-card) 100%); border-color:rgba(196,151,58,0.18); }
.brand-card:active { background:var(--bg-raised); transform:scale(0.97); }
@media(hover:hover){.brand-card:hover{background:var(--bg-raised);border-color:var(--border-hi);transform:translateY(-2px);}}
.bc-photo {
  width:100%; aspect-ratio:16/9; background:var(--bg-raised); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-3); font-size:10px; letter-spacing:0.1em;
  text-transform:uppercase; font-weight:500; border:1px dashed rgba(196,151,58,0.12);
}
.bc-name { font-family:'Playfair Display',serif; font-size:14px; font-weight:600; color:var(--text-1); line-height:1.25; }
.bc-tier { font-size:9px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; }
.bc-tier.sp { color:var(--gold); }
.bc-tier.pr { color:#B09070; }
.bc-tier.mr { color:var(--text-2); }
.bc-tier.en { color:var(--text-3); }
.bc-cta { font-size:10px; color:var(--text-3); margin-top:auto; }

/* ── MOCO BRANDS ── */
.moco-notice {
  background:rgba(26,58,139,0.1); border:1px solid rgba(100,130,200,0.18);
  border-radius:12px; padding:12px 14px; font-size:12px; color:#8899CC;
  line-height:1.55; margin-bottom:16px;
}
.moco-notice strong { color:#AAC0FF; }
.moco-grid { display:grid; grid-template-columns:1fr; gap:10px; }
@media(min-width:560px){.moco-grid{grid-template-columns:repeat(3,1fr);}}
.moco-card {
  background:linear-gradient(140deg,#0C0E1A 0%,#131522 100%);
  border:1px solid rgba(100,130,200,0.2); border-radius:12px;
  padding:22px 18px; cursor:pointer; position:relative;
  transition:all 0.15s ease; -webkit-user-select:none; user-select:none;
}
.moco-card::after { content:'MOCO BRANDS'; position:absolute; top:10px; right:12px; font-size:8px; font-weight:700; letter-spacing:0.14em; color:rgba(150,170,220,0.38); }
.moco-card:active { transform:scale(0.97); border-color:rgba(100,130,200,0.4); }
@media(hover:hover){.moco-card:hover{border-color:rgba(100,130,200,0.38);transform:translateY(-2px);}}
.mc-name { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; color:var(--text-1); margin-bottom:5px; }
.mc-sub { font-size:11px; color:var(--text-3); }

/* ── DETAIL PLACEHOLDER ── */
.detail-wrap {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:calc(100vh - 48px); text-align:center; gap:18px; padding:40px 24px;
}
.detail-icon { font-size:50px; opacity:0.15; }
.detail-name { font-family:'Playfair Display',serif; font-size:28px; font-weight:600; color:var(--text-1); }
.detail-text { font-size:14px; color:var(--text-2); max-width:300px; line-height:1.65; }
.stage-pill {
  display:inline-block; background:var(--gold-pale); border:1px solid var(--gold-dim);
  border-radius:20px; padding:7px 18px; font-size:11px; font-weight:600;
  letter-spacing:0.1em; color:var(--gold);
}
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:2px; }
</style>
</head>
<body>
<div id="app">

  <!-- HOME -->
  <div class="screen active" id="sc-home">
    <div class="home-wrap">
      <div class="hero">
        <div class="eyebrow">Internal Sales Reference</div>
        <div class="hero-name">Moco Meats</div>
        <div class="hero-sub">Brand &amp; Product Guide</div>
        <div class="hero-rule"></div>
        <div class="hero-prompt">Select a species to begin</div>
      </div>
      <div class="species-grid" id="species-grid"></div>
      <div class="home-footer"><p>Moco Food Services &nbsp;&middot;&nbsp; Internal Use Only &nbsp;&middot;&nbsp; 2026</p></div>
    </div>
  </div>

  <!-- CATEGORIES (Beef only) -->
  <div class="screen" id="sc-cats">
    <div class="topbar">
      <button class="back-btn" data-action="back">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11.5L4.5 7 9 2.5"/></svg>
        Back
      </button>
      <div class="bc-nav" id="cats-bc"></div>
    </div>
    <div class="section-hero" id="cats-hero"></div>
    <div class="s-content">
      <div class="s-meta" id="cats-meta"></div>
      <div class="cat-list" id="cat-list"></div>
    </div>
  </div>

  <!-- BRANDS -->
  <div class="screen" id="sc-brands">
    <div class="topbar">
      <button class="back-btn" data-action="back">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11.5L4.5 7 9 2.5"/></svg>
        Back
      </button>
      <div class="bc-nav" id="brands-bc"></div>
    </div>
    <div class="section-hero" id="brands-hero"></div>
    <div class="s-content" id="brands-content"></div>
  </div>

  <!-- DETAIL (Stage 3 placeholder) -->
  <div class="screen" id="sc-detail">
    <div class="topbar">
      <button class="back-btn" data-action="back">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11.5L4.5 7 9 2.5"/></svg>
        Back
      </button>
      <div class="bc-nav" id="detail-bc"></div>
    </div>
    <div class="detail-wrap">
      <div class="detail-icon">🥩</div>
      <div class="detail-name" id="detail-name"></div>
      <div class="detail-text">Full brand profile — selling points, provenance, venue suitability and conversation starters.</div>
      <div class="stage-pill">Stage 3 — Brand Detail</div>
    </div>
  </div>

</div>
<script>
/* ── ICONS ── */
const ICONS = {
  beef: `<svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <ellipse cx="30" cy="35" rx="17" ry="14"/>
    <path d="M15 26C10 18 10 9 16 8C17 14 17 22 18 25"/>
    <path d="M45 26C50 18 50 9 44 8C43 14 43 22 42 25"/>
    <ellipse cx="9" cy="32" rx="3.5" ry="5" transform="rotate(-12 9 32)"/>
    <ellipse cx="51" cy="32" rx="3.5" ry="5" transform="rotate(12 51 32)"/>
    <ellipse cx="30" cy="43" rx="8.5" ry="5"/>
    <circle cx="26.5" cy="43" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="33.5" cy="43" r="1.6" fill="currentColor" stroke="none"/>
    <circle cx="22" cy="31" r="2" fill="currentColor" stroke="none"/>
    <circle cx="38" cy="31" r="2" fill="currentColor" stroke="none"/>
  </svg>`,
  lamb: `<svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M14 30C14 20 21 13 30 13C39 13 46 20 46 30C46 40 39 47 30 47C21 47 14 40 14 30Z"/>
    <path d="M21 15C19 9 23 6 25 10"/>
    <path d="M30 13C30 7 35 5 34 10"/>
    <path d="M39 15C41 9 45 11 43 15"/>
    <path d="M13 31C7 29 6 36 11 37"/>
    <path d="M47 31C53 29 54 36 49 37"/>
    <ellipse cx="30" cy="42" rx="7" ry="4"/>
    <circle cx="23" cy="31" r="1.8" fill="currentColor" stroke="none"/>
    <circle cx="37" cy="31" r="1.8" fill="currentColor" stroke="none"/>
  </svg>`,
  pork: `<svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="30" cy="33" r="18"/>
    <path d="M18 18C16 10 21 7 23 12C21 14 19 16 18 18"/>
    <path d="M42 18C44 10 39 7 37 12C39 14 41 16 42 18"/>
    <circle cx="30" cy="41" r="8.5"/>
    <circle cx="26.5" cy="41" r="2" fill="currentColor" stroke="none"/>
    <circle cx="33.5" cy="41" r="2" fill="currentColor" stroke="none"/>
    <circle cx="22" cy="27" r="2.2" fill="currentColor" stroke="none"/>
    <circle cx="38" cy="27" r="2.2" fill="currentColor" stroke="none"/>
  </svg>`,
  chicken: `<svg viewBox="0 0 60 60" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="28" cy="34" r="17"/>
    <path d="M20 19C18 12 23 9 24 14"/>
    <path d="M28 17C28 10 33 8 32 13"/>
    <path d="M35 19C37 12 42 13 40 17"/>
    <path d="M45 33L53 29L51 36L55 38L46 38"/>
    <path d="M20 50C18 56 14 56 14 50"/>
    <path d="M30 50C28 56 24 56 24 50"/>
    <circle cx="36" cy="29" r="2.5" fill="currentColor" stroke="none"/>
  </svg>`
};

/* ── DATA ── */
const DATA = [
  { id:'beef', name:'Beef', count:'32 brands',
    direct:false,
    categories:[
      { id:'wagyu', name:'Wagyu', desc:'Full Blood to F1 Crossbred', n:7, accent:'#8B3018', isMoco:false,
        tiers:{'Super Premium':['Muse','Sir Harry','Senku'],'Premium':['Jacks Creek Pure Bred'],'Mid-Range':['Icon XB','Black Opal'],'Entry Level':['Jacks Creek Cross Bred']}},
      { id:'grain', name:'Grain Fed', desc:'100-day to 150-day programs', n:14, accent:'#8B6018', isMoco:false,
        tiers:{'Super Premium':['The Bachelor','Pure Prime'],'Premium':['Ebony Black Angus','Jacks Creek Black Angus','Riverina Black Angus','Yardstick','Kilcoy Black Diamond'],'Mid-Range':['Beef City Platinum','Royal'],'Entry Level':['AMH White','AMH Black','Beef City Black','Kilcoy Blue Diamond']}},
      { id:'grass', name:'Grass / Pasture Fed', desc:'Pasture raised, natural production', n:7, accent:'#2A5C22', isMoco:false,
        tiers:{'Super Premium':['Southern Ranges'],'Premium':['Vintage Beef'],'Mid-Range':['Roam','AMG','Right to Roam'],'Entry Level':['AMH']}},
      { id:'moco-beef', name:'Moco Brands', desc:"Moco's own exclusive beef range", n:3, accent:'#1A3A8B', isMoco:true,
        tiers:{'Featured':["Pioneer's Cut","Jack's Best",'Centenary Station']}}
    ]
  },
  { id:'lamb', name:'Lamb', count:'4 brands',
    direct:true, directCat:'all-lamb',
    categories:[
      { id:'all-lamb', name:'All Lamb', desc:'Super Premium to Entry Level', n:4, accent:'#7A3A18', isMoco:false,
        tiers:{'Super Premium':['Margra'],'Premium':['Sovereign'],'Mid-Range':['Snowy Peaks'],'Entry Level':['Ambassador']}}
    ]
  },
  { id:'pork', name:'Pork', count:'8 brands',
    direct:true, directCat:'all-pork',
    categories:[
      { id:'all-pork', name:'All Pork', desc:'Free Range to Volume', n:8, accent:'#6A2258', isMoco:false,
        tiers:{'Super Premium':['Borrowdale','Oria'],'Premium':['Apple Tree'],'Mid-Range':['Barkers Creek','MOR'],'Entry Level':["Schulz's",'Sunpork','Spring Grove']}}
    ]
  },
  { id:'chicken', name:'Chicken', count:'1 brand',
    direct:true, directCat:'moco-chicken',
    categories:[
      { id:'moco-chicken', name:'Moco Brands', desc:"Moco's exclusive chicken range", n:1, accent:'#1A3A8B', isMoco:true,
        tiers:{'Featured':['Acacia Valley']}}
    ]
  }
];

const TC = {'Super Premium':'sp','Premium':'pr','Mid-Range':'mr','Entry Level':'en','Featured':'fe'};

/* ── STATE ── */
let cur = 'home', stack = [], selSpecies = null, selCat = null, selBrand = null;

/* ── HELPERS ── */
function getSp()  { return DATA.find(s => s.id === selSpecies); }
function getCat() { const sp = getSp(); return sp ? sp.categories.find(c => c.id === selCat) : null; }

/* ── ANIMATION ── */
function animFwd(fromId, toId) {
  const from = document.getElementById('sc-' + fromId);
  const to   = document.getElementById('sc-' + toId);
  from.classList.add('behind');
  to.classList.add('active');
  to.scrollTop = 0;
  setTimeout(() => { from.classList.remove('active'); }, 340);
}

function animBack(fromId, toId) {
  const from = document.getElementById('sc-' + fromId);
  const to   = document.getElementById('sc-' + toId);
  if (!to.classList.contains('behind') && !to.classList.contains('active')) {
    to.style.transition = 'none';
    to.style.transform  = 'translateX(-22%)';
    void to.offsetHeight;
    to.style.transition = '';
    to.style.transform  = '';
    to.classList.add('behind');
  }
  to.classList.add('active');
  to.classList.remove('behind');
  from.classList.remove('active');
  setTimeout(() => {
    from.classList.remove('active','behind');
    to.style.transform = '';
    to.style.transition = '';
  }, 350);
}

/* ── NAVIGATION ── */
function push(toId, updates) {
  if (updates) {
    if (updates.species !== undefined) selSpecies = updates.species;
    if (updates.cat     !== undefined) selCat     = updates.cat;
    if (updates.brand   !== undefined) selBrand   = updates.brand;
  }
  const fromId = cur;
  stack.push(fromId);
  renderScreen(toId);
  updateTopbar(toId);
  animFwd(fromId, toId);
  cur = toId;
}

function goBack() {
  if (!stack.length) return;
  const prevId = stack.pop();
  const fromId = cur;
  updateTopbar(prevId);
  animBack(fromId, prevId);
  cur = prevId;
}

function jumpBack(targetId) {
  if (targetId === cur) return;
  const fromId = cur;
  const idx = stack.lastIndexOf(targetId);
  if (idx !== -1) stack = stack.slice(0, idx);
  else stack = [];
  updateTopbar(targetId);
  animBack(fromId, targetId);
  cur = targetId;
}

/* ── RENDER ── */
function renderScreen(id) {
  if (id === 'cats')   renderCats();
  if (id === 'brands') renderBrands();
  if (id === 'detail') renderDetail();
}

function renderHome() {
  document.getElementById('species-grid').innerHTML = DATA.map(sp => `
    <div class="species-card" data-nav="species" data-id="${sp.id}">
      <div class="s-icon">${ICONS[sp.id]}</div>
      <div class="s-name">${sp.name}</div>
      <div class="s-count">${sp.count}</div>
      <div class="s-arrow">&#8250;</div>
    </div>`).join('');
}

function renderCats() {
  const sp = getSp();
  const total = sp.categories.reduce((a,c) => a + c.n, 0);
  document.getElementById('cats-hero').innerHTML = `
    <div class="sh-icon">${ICONS[sp.id]}</div>
    <div class="sh-title">${sp.name}</div>
    <div class="sh-rule"></div>
    <div class="sh-sub">${sp.categories.length} categories &nbsp;&middot;&nbsp; ${total} brands</div>`;
  document.getElementById('cats-meta').textContent = 'Select a category';
  document.getElementById('cat-list').innerHTML = sp.categories.map(c => `
    <div class="cat-card" style="--cat-accent:${c.accent}" data-nav="cat" data-id="${c.id}">
      <div class="cat-left">
        <div class="cat-name">${c.name}</div>
        <div class="cat-desc">${c.desc}</div>
        ${c.isMoco ? '<div class="moco-tag">&#9733; Push priority</div>' : ''}
      </div>
      <div class="cat-right">
        <div class="cat-pill">${c.n} brand${c.n !== 1 ? 's' : ''}</div>
        <div class="cat-arrow">&#8250;</div>
      </div>
    </div>`).join('');
}

function renderBrands() {
  const sp  = getSp();
  const cat = getCat();
  const totalBrands = Object.values(cat.tiers).flat().length;

  document.getElementById('brands-hero').innerHTML = `
    <div class="sh-eyebrow">${sp.name}</div>
    <div class="sh-title">${cat.name}</div>
    <div class="sh-rule"></div>
    <div class="sh-sub">${totalBrands} brand${totalBrands !== 1 ? 's' : ''}</div>`;

  let html = '';
  if (cat.isMoco) {
    const brands = Object.values(cat.tiers).flat();
    html = `<div class="moco-notice">&#9733; <strong>Push priority.</strong> Know these brands inside out and lead with them whenever it's the right fit for the customer.</div>
    <div class="moco-grid">${brands.map(b => `
      <div class="moco-card" data-nav="brand" data-id="${b.replace(/"/g,'&quot;')}">
        <div class="mc-name">${b}</div>
        <div class="mc-sub">Tap to explore</div>
      </div>`).join('')}
    </div>`;
  } else {
    html = Object.entries(cat.tiers).map(([tier, brands]) => {
      const tc = TC[tier] || 'en';
      return `<div class="tier-block">
        <div class="tier-row"><span class="tier-tag ${tc}">${tier}</span><div class="tier-line"></div></div>
        <div class="brands-grid">${brands.map(b => `
          <div class="brand-card ${tc === 'sp' ? 'sp' : ''}" data-nav="brand" data-id="${b.replace(/"/g,'&quot;')}">
            <div class="bc-photo">Photo</div>
            <div class="bc-name">${b}</div>
            <div class="bc-tier ${tc}">${tier}</div>
            <div class="bc-cta">Tap to explore &#8250;</div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('brands-content').innerHTML = html;
}

function renderDetail() {
  document.getElementById('detail-name').textContent = selBrand || '';
}

/* ── TOPBAR / BREADCRUMB ── */
function updateTopbar(screenId) {
  const sp  = getSp();
  const cat = getCat();
  const id  = screenId || cur;
  let bc = '';

  if (id === 'cats') {
    bc = `<span class="bc-link" data-jump="home">Home</span>
          <span class="bc-sep">&#8250;</span>
          <span class="bc-cur">${sp ? sp.name : ''}</span>`;
  } else if (id === 'brands') {
    if (sp && sp.direct) {
      bc = `<span class="bc-link" data-jump="home">Home</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-cur">${sp.name}</span>`;
    } else {
      bc = `<span class="bc-link" data-jump="home">Home</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-link" data-jump="cats">${sp ? sp.name : ''}</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-cur">${cat ? cat.name : ''}</span>`;
    }
  } else if (id === 'detail') {
    if (sp && sp.direct) {
      bc = `<span class="bc-link" data-jump="home">Home</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-link" data-jump="brands">${sp.name}</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-cur">${selBrand || ''}</span>`;
    } else {
      bc = `<span class="bc-link" data-jump="home">Home</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-link" data-jump="cats">${sp ? sp.name : ''}</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-link" data-jump="brands">${cat ? cat.name : ''}</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-cur">${selBrand || ''}</span>`;
    }
  }

  const bcEl = document.getElementById(id.replace('-','') + '-bc') ||
               document.getElementById(id + '-bc');
  if (bcEl) bcEl.innerHTML = bc;
}

/* ── EVENTS ── */
document.addEventListener('click', function(e) {
  /* Back button */
  if (e.target.closest('[data-action="back"]')) { goBack(); return; }

  /* Breadcrumb jump */
  const bl = e.target.closest('[data-jump]');
  if (bl) { jumpBack(bl.dataset.jump); return; }

  /* Species card */
  const sc = e.target.closest('[data-nav="species"]');
  if (sc) {
    const sp = DATA.find(s => s.id === sc.dataset.id);
    if (sp.direct) {
      push('brands', { species: sp.id, cat: sp.directCat });
    } else {
      push('cats', { species: sp.id });
    }
    return;
  }

  /* Category card */
  const cc = e.target.closest('[data-nav="cat"]');
  if (cc) { push('brands', { cat: cc.dataset.id }); return; }

  /* Brand card */
  const bc = e.target.closest('[data-nav="brand"]');
  if (bc) { push('detail', { brand: bc.dataset.id }); return; }
});

/* ── INIT ── */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderHome);
} else {
  renderHome();
}
</script>
</body>
</html>
