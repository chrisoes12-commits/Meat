<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Moco Meats — Brand Guide</title>
<!-- Fix 2: Preconnect hints for faster font loading -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Fix 1: font-display=swap explicitly requested -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

/* ── DESIGN TOKENS ── */
:root {
  /* Base */
  --bg:          #0F0E0B;
  --bg-card:     #1A1814;
  --bg-raised:   #222018;
  --gold:        #C4973A;
  --gold-dim:    rgba(196,151,58,0.32);
  --gold-pale:   rgba(196,151,58,0.08);
  --text-1:      #F0EAE0;
  --text-2:      #A09078;
  --text-3:      #564A3C;
  --border:      rgba(196,151,58,0.10);
  --border-hi:   rgba(196,151,58,0.28);
  --ease:        cubic-bezier(0.4,0,0.2,1);
  --ease-back:   cubic-bezier(0.2,0,0.4,1);
  --dur-fwd:     0.34s;
  --dur-back:    0.22s;

  /* Category colour systems */
  --wagyu-bg:       #0A0806;
  --wagyu-accent:   #8B2A12;
  --wagyu-glow:     rgba(139,42,18,0.18);
  --wagyu-border:   rgba(196,151,58,0.22);
  --wagyu-tint:     rgba(80,15,5,0.55);

  --grain-bg:       #0C0A06;
  --grain-accent:   #8B6018;
  --grain-glow:     rgba(139,96,24,0.18);
  --grain-border:   rgba(196,151,58,0.20);
  --grain-tint:     rgba(80,55,5,0.50);

  --grass-bg:       #060C07;
  --grass-accent:   #2A5C22;
  --grass-glow:     rgba(42,92,34,0.20);
  --grass-border:   rgba(42,92,34,0.28);
  --grass-tint:     rgba(10,40,10,0.55);

  --moco-bg:        #060810;
  --moco-accent:    #1A3A8B;
  --moco-glow:      rgba(26,58,139,0.20);
  --moco-border:    rgba(100,130,200,0.22);
  --moco-tint:      rgba(5,10,40,0.55);

  --lamb-bg:        #0C0806;
  --lamb-accent:    #7A3A18;
  --lamb-glow:      rgba(122,58,24,0.18);
  --lamb-border:    rgba(180,120,80,0.22);
  --lamb-tint:      rgba(60,20,5,0.50);

  --pork-bg:        #0C060C;
  --pork-accent:    #6A2258;
  --pork-glow:      rgba(106,34,88,0.18);
  --pork-border:    rgba(180,100,160,0.22);
  --pork-tint:      rgba(50,5,40,0.50);

  --acacia-bg:      #061008;
  --acacia-accent:  #1A3A1C;
  --acacia-glow:    rgba(26,58,28,0.22);
  --acacia-border:  rgba(43,107,53,0.30);
  --acacia-tint:    rgba(5,30,8,0.55);

  /* Active category (set by JS) */
  --cat-tint:   transparent;
  --cat-glow:   transparent;
  --cat-border-col: rgba(196,151,58,0.10);
}

/* ── RESET ── */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body { height:100%; background:var(--bg); color:var(--text-1); font-family:'DM Sans',sans-serif; overflow:hidden; -webkit-font-smoothing:antialiased; }

/* ── SCREENS ── */
#app { position:fixed; inset:0; overflow:hidden; }
.screen {
  position:absolute; inset:0; background:var(--bg);
  overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch;
  transform:translateX(100%);
  transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
  will-change:transform;
  -webkit-backface-visibility:hidden;
  backface-visibility:hidden;
}
.screen.active { transform:translateX(0); }
.screen.behind { transform:translateX(-22%); }

/* ── TOPBAR ── */
.topbar {
  position:sticky; top:0; z-index:20;
  height:48px; display:flex; align-items:center; gap:10px; padding:0 14px;
  background:rgba(15,14,11,0.88);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  /* Category tint overlaid via pseudo-element */
  transition:border-color 0.4s ease;
}
.topbar::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:var(--cat-tint);
  transition:background 0.4s ease;
  z-index:-1;
}
.back-btn {
  display:flex; align-items:center; gap:4px;
  background:none; border:none; color:var(--gold);
  font-family:'DM Sans',sans-serif; font-size:14px; font-weight:500;
  cursor:pointer; padding:8px 2px; flex-shrink:0; white-space:nowrap;
}
.back-btn svg { width:14px; height:14px; }

/* ── BREADCRUMB BAR ── */
.bc-bar {
  display:flex; align-items:center; gap:5px;
  padding:8px 16px; border-bottom:1px solid var(--border);
  background:rgba(15,14,11,0.7); overflow-x:auto;
  scrollbar-width:none; -ms-overflow-style:none; flex-shrink:0;
}
.bc-bar::-webkit-scrollbar { display:none; }
.bc-link {
  font-size:11px; font-weight:500; color:var(--text-3);
  white-space:nowrap; cursor:pointer; padding:2px 0;
  transition:color 0.15s ease;
}
.bc-link:active,.bc-link:hover { color:var(--text-2); }
.bc-sep { font-size:10px; color:var(--text-3); opacity:0.4; }
.bc-cur { font-size:11px; font-weight:500; color:var(--gold); white-space:nowrap; }

/* ── SECTION HERO ── */
.section-hero {
  padding:34px 20px 26px; text-align:center;
  border-bottom:1px solid var(--border);
  position:relative; overflow:hidden;
}
.section-hero::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 80% 90% at 50% 0%, var(--cat-glow,rgba(196,151,58,0.06)) 0%, transparent 68%);
  transition:background 0.4s ease;
}
/* Grain texture on section hero */
.section-hero::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  opacity:0.03;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
  background-size:180px 180px;
}
.sh-icon { width:54px; height:54px; margin:0 auto 14px; color:var(--text-2); }
.sh-icon svg { width:100%; height:100%; }
.sh-eyebrow {
  font-size:10px; font-weight:600; letter-spacing:0.2em;
  text-transform:uppercase; color:var(--gold); margin-bottom:8px;
}
.sh-title {
  font-family:'Playfair Display',serif;
  font-size:clamp(30px,8vw,44px); font-weight:700;
  color:var(--text-1); letter-spacing:-0.02em; line-height:1.1; margin-bottom:10px;
  /* Fix 3: hero title fade-in handled on home; section heroes animate in with screen */
}
.sh-rule { width:28px; height:1px; background:var(--gold); opacity:0.4; margin:0 auto 10px; }
.sh-sub { font-size:12px; color:var(--text-2); }

/* ── HOME SCREEN ── */
.screen#sc-home { background:var(--bg); }
.home-wrap { display:flex; flex-direction:column; min-height:100%; }

/* Leather hero — dark, textured, steakhouse menu cover */
.hero {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:32px 24px 24px; text-align:center; position:relative; overflow:hidden;
}
@media(min-height:700px){.hero{padding:50px 24px 34px;}}

/* Leather base — layered gradients simulating grain and depth */
.hero::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 90% 60% at 50% 0%, rgba(40,28,16,0.95) 0%, transparent 65%),
    radial-gradient(ellipse 60% 40% at 30% 80%, rgba(30,20,10,0.6) 0%, transparent 60%),
    linear-gradient(160deg, #1A1208 0%, #0F0E0B 40%, #12100A 100%);
}

/* Leather grain overlay */
.hero::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  opacity:0.055;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='leather'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='5' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23leather)' opacity='1'/%3E%3C/svg%3E");
  background-size:280px 280px;
  mix-blend-mode:overlay;
}

/* Fix 3: Hero content fades in, masking any font-swap flash */
.hero-content {
  position:relative; z-index:1;
  animation: heroFadeUp 0.55s cubic-bezier(0.2,0,0.4,1) both;
}
@keyframes heroFadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}

.eyebrow {
  font-size:10px; font-weight:600; letter-spacing:0.22em;
  text-transform:uppercase; color:var(--gold); margin-bottom:12px;
}
.hero-name {
  font-family:'Playfair Display',serif;
  font-size:clamp(34px,9vw,58px); font-weight:700;
  letter-spacing:-0.02em; line-height:1.05; color:var(--text-1); margin-bottom:6px;
}
.hero-sub {
  font-family:'Playfair Display',serif;
  font-size:clamp(12px,3vw,17px); font-style:italic; font-weight:400;
  color:var(--text-2); margin-bottom:20px;
}
.hero-rule { width:32px; height:1px; background:var(--gold); opacity:0.4; margin:0 auto 16px; }
.hero-prompt {
  font-size:11px; font-weight:500; letter-spacing:0.14em;
  text-transform:uppercase; color:var(--text-3);
}

/* ── SPECIES GRID ── */
.species-grid {
  display:grid; grid-template-columns:1fr 1fr; gap:10px;
  padding:4px 14px 40px; max-width:700px; margin:0 auto; width:100%;
  position:relative; z-index:1;
}
@media(min-width:640px){.species-grid{grid-template-columns:repeat(4,1fr);padding:4px 24px 56px;max-width:960px;}}
.species-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:16px;
  padding:26px 14px 22px; display:flex; flex-direction:column;
  align-items:center; gap:10px; cursor:pointer; text-align:center;
  transition:border-color 0.18s ease, transform 0.18s ease, background 0.18s ease;
  -webkit-user-select:none; user-select:none;
}
.species-card:active { border-color:var(--border-hi); background:var(--bg-raised); transform:scale(0.97); }
@media(hover:hover){.species-card:hover{border-color:var(--border-hi);background:var(--bg-raised);transform:translateY(-3px);}}
.s-icon { width:46px; height:46px; color:var(--text-2); }
.s-icon svg { width:100%; height:100%; }
.s-name { font-family:'Playfair Display',serif; font-size:17px; font-weight:600; color:var(--text-1); }
.s-count { font-size:11px; color:var(--text-3); font-weight:500; }
.home-footer { margin-top:auto; padding:16px; text-align:center; border-top:1px solid var(--border); position:relative; z-index:1; }
.home-footer p { font-size:10px; color:var(--text-3); letter-spacing:0.08em; }

/* ── SCREEN CONTENT ── */
.s-content { padding:20px 14px 52px; max-width:960px; margin:0 auto; width:100%; }
@media(min-width:640px){.s-content{padding:24px 24px 64px;}}
.s-meta {
  font-size:10px; font-weight:600; letter-spacing:0.17em;
  text-transform:uppercase; color:var(--text-3);
  margin-bottom:14px; padding-bottom:10px; border-bottom:1px solid var(--border);
}

/* ── CATEGORY CARDS ── */
.cat-list { display:flex; flex-direction:column; gap:9px; }
.cat-card {
  background:var(--bg-card); border:1px solid var(--border);
  border-left:3px solid var(--cat-accent,var(--gold));
  border-radius:12px; padding:18px 16px; cursor:pointer;
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  transition:all 0.15s ease; -webkit-user-select:none; user-select:none;
  position:relative; overflow:hidden;
}
/* Subtle category glow on left side of each cat card */
.cat-card::before {
  content:''; position:absolute; left:0; top:0; bottom:0; width:60%;
  background:linear-gradient(90deg, var(--cat-card-glow, transparent) 0%, transparent 100%);
  pointer-events:none;
}
.cat-card:active { background:var(--bg-raised); transform:translateX(3px); }
@media(hover:hover){.cat-card:hover{background:var(--bg-raised);transform:translateX(4px);border-color:var(--border-hi);}}
.cat-left { display:flex; flex-direction:column; gap:3px; position:relative; }
.cat-name { font-family:'Playfair Display',serif; font-size:18px; font-weight:600; color:var(--text-1); }
.cat-desc { font-size:12px; color:var(--text-2); }
.moco-tag {
  display:inline-block; font-size:9px; font-weight:700; letter-spacing:0.12em;
  text-transform:uppercase; color:#8899CC;
  background:rgba(26,58,139,0.14); border:1px solid rgba(100,130,200,0.18);
  border-radius:20px; padding:2px 8px; margin-top:4px; width:fit-content;
}
.cat-right { display:flex; align-items:center; gap:10px; flex-shrink:0; position:relative; }
.cat-pill {
  font-size:11px; font-weight:600; color:var(--gold);
  background:var(--gold-pale); border:1px solid var(--gold-dim);
  border-radius:20px; padding:3px 10px; white-space:nowrap;
}
.cat-arrow { color:var(--text-3); font-size:16px; }

/* ── BRAND GRID ── */
.tier-block { margin-bottom:26px; }
.tier-row { display:flex; align-items:center; gap:10px; margin-bottom:11px; }
.tier-tag {
  font-size:9px; font-weight:700; letter-spacing:0.2em;
  text-transform:uppercase; white-space:nowrap;
}
.tier-tag.sp { color:var(--gold); }
.tier-tag.pr { color:#B09070; }
.tier-tag.mr { color:var(--text-2); }
.tier-tag.en { color:var(--text-3); }
.tier-tag.fe { color:#8899CC; }
.tier-line { flex:1; height:1px; background:var(--border); }
.brands-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; }
@media(min-width:560px){.brands-grid{grid-template-columns:repeat(3,1fr);}}
@media(min-width:860px){.brands-grid{grid-template-columns:repeat(4,1fr);}}

/* ── BRAND CARDS — tiered hierarchy ── */
.brand-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:12px;
  padding:14px 13px; cursor:pointer; display:flex; flex-direction:column;
  gap:8px; min-height:130px;
  transition:all 0.15s ease; -webkit-user-select:none; user-select:none;
  position:relative; overflow:hidden;
}

/* Super Premium — full width, taller, dramatic */
.brand-card.sp {
  grid-column: span 2;
  min-height:160px;
  background:linear-gradient(145deg, var(--sp-card-bg-a, #17100A) 0%, var(--sp-card-bg-b, #1A1814) 100%);
  border-color:var(--sp-card-border, rgba(196,151,58,0.22));
  box-shadow:inset 0 1px 0 rgba(196,151,58,0.08), 0 4px 24px rgba(0,0,0,0.4);
}
@media(min-width:560px){
  .brand-card.sp { grid-column:span 1; min-height:175px; }
}
/* Grain overlay on super premium cards */
.brand-card.sp::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  opacity:0.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='g'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23g)'/%3E%3C/svg%3E");
  background-size:160px 160px;
  mix-blend-mode:overlay;
}
/* Premium — standard size, slightly warmer */
.brand-card.pr {
  background:linear-gradient(145deg, var(--pr-card-bg, #1A1814) 0%, var(--bg-card) 100%);
  border-color:var(--pr-card-border, var(--border));
}
/* Mid & Entry — clean, no gradient noise */
.brand-card.mr, .brand-card.en {
  background:var(--bg-card);
}

.brand-card:active { background:var(--bg-raised); transform:scale(0.97); }
@media(hover:hover){
  .brand-card:hover { background:var(--bg-raised); border-color:var(--border-hi); transform:translateY(-2px); }
  .brand-card.sp:hover { background:linear-gradient(145deg, var(--sp-card-bg-a, #1f1610) 0%, #1e1c16 100%); }
}

.bc-photo {
  width:100%; aspect-ratio:16/9; background:var(--bg-raised); border-radius:6px;
  display:flex; align-items:center; justify-content:center;
  color:var(--text-3); font-size:10px; letter-spacing:0.1em;
  text-transform:uppercase; font-weight:500; border:1px dashed rgba(196,151,58,0.12);
}
.bc-name {
  font-family:'Playfair Display',serif; font-size:14px; font-weight:600;
  color:var(--text-1); line-height:1.25;
}
.brand-card.sp .bc-name { font-size:17px; }
.bc-tier { font-size:9px; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; }
.bc-tier.sp { color:var(--gold); }
.bc-tier.pr { color:#B09070; }
.bc-tier.mr { color:var(--text-2); }
.bc-tier.en { color:var(--text-3); }
.bc-cta { font-size:10px; color:var(--text-3); margin-top:auto; }

/* ── MOCO BRANDS ── */
.moco-notice {
  background:rgba(26,58,139,0.10); border:1px solid rgba(100,130,200,0.18);
  border-radius:12px; padding:12px 14px; font-size:12px; color:#8899CC;
  line-height:1.55; margin-bottom:16px;
}
.moco-notice strong { color:#AAC0FF; }
.moco-grid { display:grid; grid-template-columns:1fr; gap:10px; }
@media(min-width:560px){.moco-grid{grid-template-columns:repeat(3,1fr);}}
.moco-card {
  background:linear-gradient(140deg,#0C0E1A 0%,#131522 100%);
  border:1px solid rgba(100,130,200,0.2); border-radius:12px;
  padding:22px 18px; cursor:pointer; position:relative;
  transition:all 0.15s ease; -webkit-user-select:none; user-select:none;
}
.moco-card::after {
  content:'MOCO BRANDS'; position:absolute; top:10px; right:12px;
  font-size:8px; font-weight:700; letter-spacing:0.14em;
  color:rgba(150,170,220,0.38);
}
.moco-card:active { transform:scale(0.97); border-color:rgba(100,130,200,0.4); }
@media(hover:hover){.moco-card:hover{border-color:rgba(100,130,200,0.38);transform:translateY(-2px);}}
.mc-name {
  font-family:'Playfair Display',serif; font-size:18px; font-weight:600;
  color:var(--text-1); margin-bottom:5px;
}
.mc-sub { font-size:11px; color:var(--text-3); }


/* ── SECTION HERO — category stagger animation ── */
.sh-title.animate-in {
  animation: shTitleIn 0.38s cubic-bezier(0.2,0,0.4,1) 0.08s both;
}
@keyframes shTitleIn {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--gold-dim); border-radius:2px; }

/* ── STAGE 3: BRAND DETAIL SHEET ── */
#sheet-overlay {
  position:fixed; inset:0; z-index:50;
  background:rgba(8,7,5,0.75);
  -webkit-backdrop-filter:blur(4px); backdrop-filter:blur(4px);
  opacity:0; pointer-events:none;
  transition:opacity 0.3s ease;
}
#sheet-overlay.open { opacity:1; pointer-events:auto; }

#brand-sheet {
  position:fixed; left:0; right:0; bottom:0; z-index:51;
  height:90%; max-height:90vh;
  background:var(--sheet-bg,#100806);
  border-top:1px solid var(--sheet-border,rgba(196,151,58,0.25));
  border-radius:18px 18px 0 0;
  transform:translateY(100%);
  transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);
  will-change:transform;
  -webkit-backface-visibility:hidden;
  overflow-y:auto; -webkit-overflow-scrolling:touch;
}
#brand-sheet.open { transform:translateY(0); }

#sheet-handle {
  position:sticky; top:0; z-index:2;
  width:100%; padding:10px 0 8px;
  display:flex; justify-content:center;
  background:inherit;
}
#sheet-handle::after {
  content:''; width:36px; height:4px; border-radius:2px;
  background:rgba(196,151,58,0.22);
}

/* Banner */
.sheet-banner {
  position:relative; aspect-ratio:3/1; overflow:hidden;
  background:var(--banner-bg,#1A1210);
  display:flex; align-items:center; justify-content:center;
}
.sheet-banner::after {
  content:''; position:absolute; inset:0; pointer-events:none;
  opacity:0.05;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='sg'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23sg)'/%3E%3C/svg%3E");
  background-size:160px 160px;
}

  // Ensure clean state — no inline overrides
  from.style.cssText = '';
  to.style.cssText   = '';

  // Position incoming screen off-right (its default), push current screen behind
  from.classList.add('behind');
  to.classList.add('active');
  to.scrollTop = 0;

  // Stagger section hero title
  const shTitle = to.querySelector('.sh-title');
  if (shTitle) {
    shTitle.classList.remove('animate-in');
    void shTitle.offsetWidth;
    shTitle.classList.add('animate-in');
  }

  setTimeout(() => {
    from.classList.remove('active', 'behind');
    navLocked = false;
  }, DUR_FWD + 50);
}

function animBack(fromId, toId) {
  const from = document.getElementById('sc-' + fromId);
  const to   = document.getElementById('sc-' + toId);

  // Wipe any inline styles — clean slate for Safari
  from.style.cssText = '';
  to.style.cssText   = '';

  // If the destination isn't already sitting behind (e.g. after a jumpBack),
  // snap it there instantly before animating — suppress transition during snap
  if (!to.classList.contains('behind') && !to.classList.contains('active')) {
    to.style.transition = 'none';
    to.style.transform  = 'translateX(-22%)';
    void to.offsetHeight; // force reflow so Safari registers the snap
    to.style.cssText = ''; // clear inline — CSS class takes over
  }

  // Now animate: bring destination forward, slide current off-right
  requestAnimationFrame(() => {
    to.classList.add('active');
    to.classList.remove('behind');
    from.classList.remove('active');
    from.classList.remove('behind');

    setTimeout(() => {
      from.classList.remove('active', 'behind');
      navLocked = false;
    }, DUR_BACK + 50);
  });
}

/* ── NAVIGATION ── */
function push(toId, updates) {
  if (navLocked) return;
  navLocked = true;
  if (updates) {
    if (updates.species !== undefined) selSpecies = updates.species;
    if (updates.cat     !== undefined) selCat     = updates.cat;
    if (updates.brand   !== undefined) selBrand   = updates.brand;
  }
  const fromId = cur;
  stack.push(fromId);
  renderScreen(toId);
  updateTopbar(toId);
  // Apply category theme after render
  if (selCat) applyTheme(selCat, toId);
  animFwd(fromId, toId);
  cur = toId;
}

function goBack() {
  if (sheetOpen) { closeSheet(); return; }
  if (navLocked || !stack.length) return;
  navLocked = true;
  const prevId = stack.pop();
  const fromId = cur;
  updateTopbar(prevId);
  // Reapply theme for destination screen
  if (selCat) applyTheme(selCat, prevId);
  animBack(fromId, prevId);
  cur = prevId;
}

function jumpBack(targetId) {
  if (sheetOpen) closeSheet();
  if (navLocked || targetId === cur) return;
  navLocked = true;
  const fromId = cur;
  const idx = stack.lastIndexOf(targetId);
  if (idx !== -1) stack = stack.slice(0, idx);
  else stack = [];
  updateTopbar(targetId);
  if (selCat) applyTheme(selCat, targetId);
  animBack(fromId, targetId);
  cur = targetId;
}

/* ── RENDER ── */
function renderScreen(id) {
  if (id === 'cats')   renderCats();
  if (id === 'brands') renderBrands();
}

function heroTitle(sp, cat) {
  if (cat.id === 'all-lamb')     return 'Lamb';
  if (cat.id === 'all-pork')     return 'Pork';
  if (cat.id === 'moco-chicken') return 'Acacia Valley Chicken';
  return cat.name;
}

function renderHome() {
  document.getElementById('species-grid').innerHTML = DATA.map(sp => `
    <div class="species-card" data-nav="species" data-id="${sp.id}">
      <div class="s-icon">${ICONS[sp.id]}</div>
      <div class="s-name">${sp.name}</div>
      <div class="s-count">${sp.count}</div>
    </div>`).join('');
}

function renderCats() {
  const sp = getSp();
  const total = sp.categories.reduce((a,c) => a + c.n, 0);
  document.getElementById('cats-hero').innerHTML = `
    <div class="sh-icon">${ICONS[sp.id]}</div>
    <div class="sh-title">${sp.name}</div>
    <div class="sh-rule"></div>
    <div class="sh-sub">${sp.categories.length} categories &nbsp;&middot;&nbsp; ${total} brands</div>`;
  document.getElementById('cats-meta').textContent = 'Select a category';
  document.getElementById('cat-list').innerHTML = sp.categories.map(c => {
    const theme = CAT_THEMES[c.id] || {};
    const cardGlow = theme.cardGlow || 'transparent';
    return `
    <div class="cat-card" style="--cat-accent:${c.accent}; --cat-card-glow:${cardGlow}" data-nav="cat" data-id="${c.id}">
      <div class="cat-left">
        <div class="cat-name">${c.name}</div>
        <div class="cat-desc">${c.desc}</div>
        ${c.isMoco ? '<div class="moco-tag">&#9733; Push priority</div>' : ''}
      </div>
      <div class="cat-right">
        <div class="cat-pill">${c.n} brand${c.n !== 1 ? 's' : ''}</div>
        <div class="cat-arrow">&#8250;</div>
      </div>
    </div>`;
  }).join('');
}

function renderBrands() {
  const sp  = getSp();
  const cat = getCat();
  const totalBrands = Object.values(cat.tiers).flat().length;
  const title = heroTitle(sp, cat);

  document.getElementById('brands-hero').innerHTML = `
    <div class="sh-eyebrow">${sp.name}</div>
    <div class="sh-title">${title}</div>
    <div class="sh-rule"></div>
    <div class="sh-sub">${totalBrands} brand${totalBrands !== 1 ? 's' : ''}</div>`;

  let html = '';
  if (cat.isMoco) {
    const brands = Object.values(cat.tiers).flat();
    html = `<div class="moco-notice">&#9733; <strong>Push priority.</strong> Know these brands inside out and lead with them whenever it's the right fit for the customer.</div>
    <div class="moco-grid">${brands.map(b => {
      const isAcacia = b === 'Acacia Valley';
      const cardStyle = isAcacia
        ? 'background:linear-gradient(140deg,#1A3A1C 0%,#0F2410 100%);border-color:rgba(43,107,53,0.4);'
        : '';
      const tagStyle = isAcacia ? 'color:rgba(100,180,100,0.5);' : '';
      return `<div class="moco-card" style="${cardStyle}" data-nav="brand" data-id="${b.replace(/"/g,'&quot;')}">
        <div class="mc-name" style="${isAcacia ? 'color:#E0F0E0;' : ''}">${b}</div>
        <div class="mc-sub" style="${tagStyle}">Tap to explore</div>
      </div>`;
    }).join('')}
    </div>`;
  } else {
    const theme = CAT_THEMES[cat.id] || {};
    html = Object.entries(cat.tiers).map(([tier, brands]) => {
      const tc = TC[tier] || 'en';
      return `<div class="tier-block">
        <div class="tier-row"><span class="tier-tag ${tc}">${tier}</span><div class="tier-line"></div></div>
        <div class="brands-grid">${brands.map(b => `
          <div class="brand-card ${tc}" data-nav="brand" data-id="${b.replace(/"/g,'&quot;')}">
            <div class="bc-photo-s3" style="background:${theme.bannerBg || 'var(--bg-raised)'};background-image:url(images/brands/thumbs/${brandSlug(b)}-thumb.jpg);background-size:cover;background-position:center;--bc-photo-text:${theme.bannerText || 'rgba(196,151,58,0.22)'}">
            </div>
            <div class="bc-name">${b}</div>
            <div class="bc-tier ${tc}">${tier}</div>
            <div class="bc-cta">Tap to explore &#8250;</div>
          </div>`).join('')}
        </div>
      </div>`;
    }).join('');
  }
  document.getElementById('brands-content').innerHTML = html;
}

/* ── TOPBAR / BREADCRUMB ── */
function updateTopbar(screenId) {
  const sp  = getSp();
  const cat = getCat();
  const id  = screenId || cur;
  let bc = '';

  if (id === 'cats') {
    bc = `<span class="bc-link" data-jump="home">Home</span>
          <span class="bc-sep">&#8250;</span>
          <span class="bc-cur">${sp ? sp.name : ''}</span>`;
  } else if (id === 'brands') {
    if (sp && sp.direct) {
      bc = `<span class="bc-link" data-jump="home">Home</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-cur">${sp.name}</span>`;
    } else {
      bc = `<span class="bc-link" data-jump="home">Home</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-link" data-jump="cats">${sp ? sp.name : ''}</span>
            <span class="bc-sep">&#8250;</span>
            <span class="bc-cur">${cat ? cat.name : ''}</span>`;
    }
  }

  const bcEl = document.getElementById(id + '-bc');
  if (bcEl) bcEl.innerHTML = bc;
}

/* ── STAGE 3: BRAND SHEET ── */
let sheetOpen = false;
const TIER_CLASS = {'Super Premium':'sp','Premium':'pr','Mid-Range':'mr','Entry Level':'en','Featured':'fe'};

function catLabel(catId) {
  const map = { wagyu:'Wagyu', grain:'Grain Fed', grass:'Grass / Pasture Fed', 'moco-beef':'Beef — Moco Brands',
    'all-lamb':'Lamb', 'all-pork':'Pork', 'moco-chicken':'Chicken — Moco Brands' };
  return map[catId] || catId;
}

function buildSheetHTML(name, b) {
  const theme = CAT_THEMES[b.catId] || {};
  const tc = TIER_CLASS[b.tier] || 'en';

  const venuesHTML = b.venues.map(v => `<span class="venue-chip${v.strong ? ' strong' : ''}">${v.name}</span>`).join('');

  const provBlock = b.provenance ? `
    <div class="acc-block" id="acc-provenance">
      <div class="acc-header"><span class="acc-title">Provenance &amp; Story</span><span class="acc-chevron">&#9662;</span></div>
      <div class="acc-content"><div class="acc-content-inner"><div class="prov-text">${b.provenance}</div></div></div>
    </div>` : '';

  const venueBlock = b.venues.length ? `
    <div class="acc-block" id="acc-venue">
      <div class="acc-header"><span class="acc-title">Venue Fit</span><span class="acc-chevron">&#9662;</span></div>
      <div class="acc-content"><div class="acc-content-inner"><div class="venue-chips-s3">${venuesHTML}</div></div></div>
    </div>` : '';

  return `
    <div class="sheet-banner" style="--banner-bg:${theme.bannerBg || '#1A1210'};background:url(images/brands/banners/${brandSlug(name)}-banner.jpg) center/cover no-repeat, ${theme.bannerBg || '#1A1210'}">
    </div>
    <div class="sheet-logo-wrap">
      <img class="sheet-logo" src="images/logos/${brandSlug(name)}-logo.png" alt="${name}" onerror="this.style.display='none'">
    </div>
    <div class="sheet-identity">
      <div class="sheet-name">${name}</div>
      <div class="sheet-producer">${b.producer}</div>
      <div class="sheet-pills">
        <span class="sheet-pill tier-${tc}">${b.tier}</span>
        <span class="sheet-pill cat-pill">${catLabel(b.catId)}</span>
      </div>
    </div>
    <div class="sheet-summary">${b.quick}</div>
    <div class="sheet-specs">${b.specs.map(s => `<span class="spec-pill-s3">${s}</span>`).join('')}</div>

    <div class="acc-block open" id="acc-selling">
      <div class="acc-header"><span class="acc-title">Key Selling Points</span><span class="acc-chevron">&#9662;</span></div>
      <div class="acc-content"><div class="acc-content-inner"><ul class="selling-points-s3">${b.sellingPoints.map(p => `<li>${p}</li>`).join('')}</ul></div></div>
    </div>
    ${provBlock}
    ${venueBlock}
    <div class="acc-block" id="acc-conv">
      <div class="acc-header"><span class="acc-title">Conversation Starter</span><span class="acc-chevron">&#9662;</span></div>
      <div class="acc-content"><div class="acc-content-inner"><div class="conv-q">"${b.conversation}"</div></div></div>
    </div>
    <div class="sheet-bottom-space"></div>
  `;
}

function openSheet(brandName) {
  const b = BRANDS[brandName];
  if (!b) return;
  const theme = CAT_THEMES[b.catId] || {};
  const sheet = document.getElementById('brand-sheet');
  sheet.style.setProperty('--sheet-bg', theme.sheetBg || '#100806');
  sheet.style.setProperty('--sheet-border', theme.sheetBorder || 'rgba(196,151,58,0.25)');
  document.getElementById('sheet-inner').innerHTML = buildSheetHTML(brandName, b);
  document.getElementById('sheet-overlay').classList.add('open');
  requestAnimationFrame(() => { sheet.classList.add('open'); });
  sheet.scrollTop = 0;
  sheetOpen = true;
}

function closeSheet() {
  document.getElementById('brand-sheet').classList.remove('open');
  document.getElementById('sheet-overlay').classList.remove('open');
  sheetOpen = false;
}

function toggleAccordion(block) {
  if (!block) return;
  block.classList.toggle('open');
}

/* Swipe-down-to-dismiss on drag handle */
(function() {
  const handle = document.getElementById('sheet-handle');
  const sheet  = document.getElementById('brand-sheet');
  let startY = 0, curY = 0, dragging = false;

  handle.addEventListener('touchstart', function(e) {
    startY = e.touches[0].clientY;
    dragging = true;
    sheet.style.transition = 'none';
  }, {passive:true});

  handle.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    curY = e.touches[0].clientY;
    const delta = Math.max(0, curY - startY);
    sheet.style.transform = `translateY(${delta}px)`;
  }, {passive:true});

  handle.addEventListener('touchend', function() {
    if (!dragging) return;
    dragging = false;
    sheet.style.transition = '';
    const delta = curY - startY;
    requestAnimationFrame(() => {
      sheet.style.transform = '';
      if (delta > 80) { closeSheet(); }
      curY = 0; startY = 0;
    });
  });
})();

/* ── EVENTS ── */
document.addEventListener('click', function(e) {
  if (e.target.closest('[data-action="back"]')) { goBack(); return; }
  const bl = e.target.closest('[data-jump]');
  if (bl) { jumpBack(bl.dataset.jump); return; }
  const sc = e.target.closest('[data-nav="species"]');
  if (sc) {
    const sp = DATA.find(s => s.id === sc.dataset.id);
    if (sp.direct) {
      push('brands', { species: sp.id, cat: sp.directCat });
    } else {
      push('cats', { species: sp.id });
    }
    return;
  }
  const cc = e.target.closest('[data-nav="cat"]');
  if (cc) { push('brands', { cat: cc.dataset.id }); return; }
  const bc = e.target.closest('[data-nav="brand"]');
  if (bc) { openSheet(bc.dataset.id); return; }
  const accH = e.target.closest('.acc-header');
  if (accH) { toggleAccordion(accH.closest('.acc-block')); return; }
  if (e.target.id === 'sheet-overlay') { closeSheet(); return; }
});

/* ── INIT ── */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', renderHome);
} else {
  renderHome();
}
</script>
